name: Scrape & Convert to Markdown

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to scrape"
        required: true
        type: string
      filename:
        description: "Output filename (without .md extension)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  scrape-convert-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ollama requests beautifulsoup4 lxml

      - name: Scrape, rephrase & convert
        env:
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
        run: |
          python scripts/scrape_and_convert.py \
            --url "${{ github.event.inputs.url }}" \
            --filename "${{ github.event.inputs.filename }}"

      - name: Commit and push to posts/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --staged --quiet; then
            echo "⚠️  Nothing to commit — file may already exist with same content."
          else
            git commit -m "post: add ${{ github.event.inputs.filename }}"
            git push
          fi
