name: Fetch & Save Image

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Image URL to download"
        required: true
        type: string
      filename:
        description: "Output filename (e.g. my-image.jpeg)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p public/images

      - name: Download image
        run: |
          curl -fsSL \
            -o "public/images/${{ github.event.inputs.filename }}" \
            "${{ github.event.inputs.url }}"

      - name: Verify download
        run: |
          FILE="public/images/${{ github.event.inputs.filename }}"
          if [ ! -f "$FILE" ]; then
            echo "❌ File not found after download."
            exit 1
          fi
          echo "✅ Saved: $FILE ($(du -h "$FILE" | cut -f1))"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/
          if git diff --staged --quiet; then
            echo "⚠️  Nothing to commit — file already exists with same content."
          else
            git commit -m "image: add ${{ github.event.inputs.filename }}"
            git push
          fi
